<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello World</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --ink: #f0ece0;
      --accent: #e8ff47;
      --muted: #3a3a3a;
      --noise-opacity: 0.035;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Courier New', 'Lucida Console', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: var(--noise-opacity);
      pointer-events: none;
      z-index: 100;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 99;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease;
      mix-blend-mode: difference;
    }

    #cursor.expand {
      width: 40px;
      height: 40px;
    }

    /* Grid background */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--muted) 1px, transparent 1px),
        linear-gradient(90deg, var(--muted) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      pointer-events: none;
    }

    /* Corner labels */
    .corner {
      position: fixed;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; text-align: right; }
    .corner.bl { bottom: 24px; left: 24px; }
    .corner.br { bottom: 24px; right: 24px; text-align: right; }

    /* Main stage */
    .stage {
      position: relative;
      text-align: center;
      z-index: 10;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.6s 0.2s ease forwards;
    }

    h1 {
      font-family: 'Arial Black', 'Impact', 'Franklin Gothic Heavy', sans-serif;
      font-size: clamp(80px, 18vw, 200px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--ink);
      position: relative;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s ease forwards;
    }

    h1 span {
      display: block;
    }

    h1 .world {
      color: transparent;
      -webkit-text-stroke: 2px var(--ink);
      transition: color 0.3s ease, -webkit-text-stroke 0.3s ease;
    }

    h1:hover .world {
      color: var(--accent);
      -webkit-text-stroke: 2px var(--accent);
    }

    .sub {
      margin-top: 32px;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s 0.7s ease forwards;
    }

    /* Click button */
    .btn {
      margin-top: 48px;
      display: inline-block;
      padding: 14px 36px;
      border: 1px solid var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ink);
      background: transparent;
      cursor: none;
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease, border-color 0.3s ease;
      opacity: 0;
      animation: fadeUp 0.6s 0.9s ease forwards;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.77,0,0.18,1);
      z-index: -1;
    }

    .btn:hover {
      color: var(--bg);
      border-color: var(--accent);
    }

    .btn:hover::before {
      transform: translateX(0);
    }

    /* Counter */
    .counter-wrap {
      margin-top: 20px;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted);
      height: 16px;
      opacity: 0;
      animation: fadeUp 0.6s 1.1s ease forwards;
    }

    #count-display {
      color: var(--accent);
      transition: transform 0.15s ease;
    }

    #count-display.pop {
      transform: scale(1.4);
    }

    /* Burst particles */
    .particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      pointer-events: none;
      z-index: 200;
      animation: burst 0.7s ease forwards;
    }

    @keyframes burst {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glitch on hover */
    h1:hover {
      animation: glitch 0.4s steps(2) 1;
    }

    @keyframes glitch {
      0%   { text-shadow: 3px 0 var(--accent), -3px 0 #ff4785; }
      25%  { text-shadow: -3px 0 var(--accent), 3px 0 #ff4785; }
      50%  { text-shadow: 3px 2px var(--accent), -3px -2px #ff4785; }
      75%  { text-shadow: -3px 0 var(--accent), 3px 0 #ff4785; }
      100% { text-shadow: none; }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div class="grid-bg"></div>

  <div class="corner tl">v1.0.0</div>
  <div class="corner tr">2026</div>
  <div class="corner bl">html · css · js</div>
  <div class="corner br" id="time"></div>

  <div class="stage">
    <p class="label">// entry point</p>
    <h1>
      <span class="hello">Hello</span>
      <span class="world">World</span>
    </h1>
    <p class="sub">The first program. The oldest ritual.</p>
    <button class="btn" id="btn">Say Hello</button>
    <p class="counter-wrap">greeted&nbsp;<span id="count-display">0</span>&nbsp;times</p>
  </div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    document.querySelectorAll('button, h1').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('expand'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('expand'));
    });

    // Live clock
    const timeEl = document.getElementById('time');
    function updateTime() {
      const now = new Date();
      timeEl.textContent = now.toLocaleTimeString('en-US', { hour12: false });
    }
    updateTime();
    setInterval(updateTime, 1000);

    // Counter + particles
    let count = 0;
    const btn = document.getElementById('btn');
    const countEl = document.getElementById('count-display');

    btn.addEventListener('click', e => {
      count++;
      countEl.textContent = count;
      countEl.classList.remove('pop');
      void countEl.offsetWidth;
      countEl.classList.add('pop');
      spawnParticles(e.clientX, e.clientY);
      setTimeout(() => countEl.classList.remove('pop'), 200);
    });

    function spawnParticles(x, y) {
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (i / 12) * Math.PI * 2;
        const dist  = 40 + Math.random() * 60;
        p.style.left = x + 'px';
        p.style.top  = y + 'px';
        p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }
  </script>
</body>
</html>
